name: Notion to Sanity Sync

on:
  repository_dispatch:
    types: [notion-sync]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run sync (single page)
        if: github.event_name == 'repository_dispatch'
        run: npx tsx scripts/notion-to-sanity.ts --page-id "${{ github.event.client_payload.notion_page_id }}"
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - name: Run sync (batch)
        if: github.event_name == 'workflow_dispatch'
        run: npx tsx scripts/notion-to-sanity.ts --batch
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
